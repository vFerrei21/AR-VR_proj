<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>NEXUS AR — Arquitetura Futurista</title>

    <!-- A-Frame (versão compatível com AR.js 2.2.2) -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>

    <!-- Estilos do portfólio (base que funciona) -->
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.6);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-ar: #4facfe;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* ─── OVERLAY ─── */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.8s ease;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }

        #overlay h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        #overlay .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }
        .marker-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
        }
        .marker-container img {
            width: 150px;
            height: 150px;
            border: 2px solid var(--accent-ar);
            border-radius: 8px;
            image-rendering: pixelated;
        }
        .marker-container .label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 2.5rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: transparent;
            color: #fff;
            border: 1px solid var(--accent-ar);
            cursor: pointer;
            font-family: inherit;
        }
        .btn:hover {
            background: var(--accent-ar);
            color: #000;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
        }

        /* ─── HUD ─── */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        #hud .hud-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #hud .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4facfe;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        #back-btn {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            padding: 0.6rem 1.8rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        #back-btn:hover {
            border-color: var(--accent-ar);
            color: #fff;
        }

        /* ─── CENA AR (AR.js) ─── */
        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
        }
        a-scene {
            width: 100%;
            height: 100%;
        }
        .marker-status {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #F5B042;
            display: none;
        }
        .marker-status.visible {
            display: block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ─── OVERLAY ─── -->
    <div id="overlay">
        <h1>NEXUS AR</h1>
        <p class="subtitle">Arquitetura Futurista em Realidade Aumentada</p>

        <div class="marker-container">
            <!-- Marcador HIRO (gerado por SVG) -->
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='white'/%3E%3Crect x='20' y='20' width='160' height='160' fill='black'/%3E%3Crect x='40' y='40' width='120' height='120' fill='white'/%3E%3Crect x='60' y='60' width='80' height='80' fill='black'/%3E%3Crect x='80' y='80' width='40' height='40' fill='white'/%3E%3C/svg%3E" alt="Marcador HIRO" />
            <p class="label">📌 Imprime ou exibe este marcador (HIRO)</p>
        </div>

        <button id="start-btn" class="btn">▶ INICIAR EXPERIÊNCIA AR</button>
    </div>

    <!-- ─── HUD ─── -->
    <div id="hud">
        <span class="hud-label"><span class="status-dot"></span> AR ATIVO</span>
        <span class="hud-label">NEXUS // v2.0</span>
        <span class="hud-label">Aponte para o marcador</span>
    </div>

    <a href="../index.html" id="back-btn">← Voltar ao Portfólio</a>

    <!-- ─── STATUS DO MARCADOR ─── -->
    <div id="markerStatus" class="marker-status">🏛️ TORRE NEXUS ENCONTRADA!</div>

    <!-- ─── CENA AR (AR.js) ─── -->
    <div id="ar-container">
        <!-- A cena será injetada aqui pelo JavaScript -->
    </div>

    <!-- ─── SCRIPTS (componentes personalizados) ─── -->
    <script>
        // ─── REGISTAR COMPONENTES A-FRAME ───

        // Helper: degToRad (para compatibilidade com A-Frame 1.2.0)
        function degToRad(deg) {
            return deg * Math.PI / 180;
        }

        // neon-material (adaptado para A-Frame 1.2.0)
        AFRAME.registerComponent('neon-material', {
            schema: {
                color:     { type: 'color', default: '#00fff7' },
                emissive:  { type: 'color', default: '#00fff7' },
                opacity:   { default: 1.0 },
                wireframe: { default: false }
            },
            init: function () {
                this.el.addEventListener('loaded', () => this.applyMaterial());
                this.applyMaterial();
            },
            applyMaterial: function () {
                const mesh = this.el.getObject3D('mesh');
                if (!mesh) return;
                mesh.traverse(node => {
                    if (node.isMesh && node.material) {
                        node.material.color.set(this.data.color);
                        node.material.emissive.set(this.data.emissive);
                        node.material.emissiveIntensity = 0.6;
                        node.material.opacity = this.data.opacity;
                        node.material.transparent = this.data.opacity < 1;
                        node.material.wireframe = this.data.wireframe;
                        node.material.needsUpdate = true;
                    }
                });
            }
        });

        // orbit-drone (com degToRad)
        AFRAME.registerComponent('orbit-drone', {
            schema: {
                radius:    { default: 0.35 },
                speed:     { default: 0.8 },
                yOffset:   { default: 0.25 },
                bobAmp:    { default: 0.05 },
                bobSpeed:  { default: 2.0 },
                tiltAmp:   { default: 12 }
            },
            init: function () {
                this.angle = Math.random() * Math.PI * 2;
                this.t = 0;
            },
            tick: function (time, delta) {
                if (!delta) return;
                const dt = delta / 1000;
                this.angle += dt * this.data.speed;
                this.t     += dt;

                const d = this.data;
                const x = Math.cos(this.angle) * d.radius;
                const z = Math.sin(this.angle) * d.radius;
                const y = d.yOffset + Math.sin(this.t * d.bobSpeed) * d.bobAmp;

                this.el.object3D.position.set(x, y, z);

                const heading = Math.atan2(
                    -Math.cos(this.angle),
                     Math.sin(this.angle)
                );
                this.el.object3D.rotation.y = heading;
                this.el.object3D.rotation.z = Math.sin(this.t * d.bobSpeed) * degToRad(d.tiltAmp);
            }
        });

        // tower-pulse
        AFRAME.registerComponent('tower-pulse', {
            schema: {
                speed:    { default: 1.5 },
                minScale: { default: 0.97 },
                maxScale: { default: 1.03 }
            },
            init: function () {
                this.t = 0;
                this.baseColor = new THREE.Color('#00fff7');
                this.altColor  = new THREE.Color('#7700ff');
            },
            tick: function (time, delta) {
                if (!delta) return;
                this.t += delta * 0.001 * this.data.speed;
                const s = this.data.minScale + (this.data.maxScale - this.data.minScale) *
                          (0.5 + 0.5 * Math.sin(this.t));
                this.el.object3D.scale.set(s, 1, s);

                const mesh = this.el.getObject3D('mesh');
                if (mesh) {
                    const alpha = 0.5 + 0.5 * Math.sin(this.t * 0.7);
                    const col = this.baseColor.clone().lerp(this.altColor, alpha);
                    mesh.traverse(n => {
                        if (n.isMesh && n.material) {
                            n.material.emissive.copy(col);
                            n.material.needsUpdate = true;
                        }
                    });
                }
            }
        });

        // ring-spin
        AFRAME.registerComponent('ring-spin', {
            schema: {
                speedX: { default: 0 },
                speedY: { default: 1 },
                speedZ: { default: 0 }
            },
            tick: function (time, delta) {
                if (!delta) return;
                const dt = delta * 0.001;
                const r = this.el.object3D.rotation;
                r.x += dt * this.data.speedX;
                r.y += dt * this.data.speedY;
                r.z += dt * this.data.speedZ;
            }
        });

        // ─── DETECTOR DE MARCADOR (AR.js) ───
        AFRAME.registerComponent('marker-detector', {
            init: function() {
                const statusDiv = document.getElementById('markerStatus');
                let detected = false;
                this.el.addEventListener('markerFound', () => {
                    if (!detected) {
                        detected = true;
                        statusDiv.classList.add('visible');
                        console.log('🏛️ TORRE NEXUS ENCONTRADA!');
                    }
                });
                this.el.addEventListener('markerLost', () => {
                    detected = false;
                    statusDiv.classList.remove('visible');
                    console.log('🔴 Torre perdida');
                });
            }
        });

        // ─── CRIAR CENA AR (AR.js) ───
        function startAR() {
            // Esconder overlay
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('ar-container').style.display = 'block';

            const container = document.getElementById('ar-container');

            // Criar a cena A-Frame com AR.js
            const scene = document.createElement('a-scene');
            scene.setAttribute('embedded', '');
            scene.setAttribute('vr-mode-ui', 'enabled: false');
            scene.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false; detectionMode: mono;');

            // Câmara
            const camera = document.createElement('a-entity');
            camera.setAttribute('camera', '');
            scene.appendChild(camera);

            // ─── MARCADOR HIRO ───
            const marker = document.createElement('a-marker');
            marker.setAttribute('preset', 'hiro');
            marker.setAttribute('marker-detector', '');

            // ==========================================
            // === NEXUS TOWER — TODO O CONTEÚDO 3D ===
            // ==========================================

            // Base platform
            const base = document.createElement('a-cylinder');
            base.setAttribute('radius', '0.22');
            base.setAttribute('height', '0.015');
            base.setAttribute('position', '0 0.007 0');
            base.setAttribute('color', '#001233');
            base.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7; opacity: 0.85');
            base.setAttribute('tower-pulse', 'speed: 1.2');
            marker.appendChild(base);

            // Platform ring
            const ring1 = document.createElement('a-torus');
            ring1.setAttribute('radius', '0.22');
            ring1.setAttribute('radius-tubular', '0.008');
            ring1.setAttribute('position', '0 0.015 0');
            ring1.setAttribute('rotation', '90 0 0');
            ring1.setAttribute('color', '#00fff7');
            ring1.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7');
            ring1.setAttribute('ring-spin', 'speedY: 0.4');
            marker.appendChild(ring1);

            // Main tower body
            const body = document.createElement('a-box');
            body.setAttribute('width', '0.07');
            body.setAttribute('height', '0.55');
            body.setAttribute('depth', '0.07');
            body.setAttribute('position', '0 0.29 0');
            body.setAttribute('color', '#001233');
            body.setAttribute('neon-material', 'color: #001233; emissive: #003366; wireframe: false');
            marker.appendChild(body);

            // Tower wireframe overlay
            const wireframe = document.createElement('a-box');
            wireframe.setAttribute('width', '0.075');
            wireframe.setAttribute('height', '0.56');
            wireframe.setAttribute('depth', '0.075');
            wireframe.setAttribute('position', '0 0.29 0');
            wireframe.setAttribute('color', '#00fff7');
            wireframe.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7; wireframe: true; opacity: 0.6');
            marker.appendChild(wireframe);

            // Mid ring
            const ring2 = document.createElement('a-torus');
            ring2.setAttribute('radius', '0.08');
            ring2.setAttribute('radius-tubular', '0.007');
            ring2.setAttribute('position', '0 0.25 0');
            ring2.setAttribute('rotation', '90 0 0');
            ring2.setAttribute('color', '#ff00aa');
            ring2.setAttribute('neon-material', 'color: #ff00aa; emissive: #ff00aa');
            ring2.setAttribute('ring-spin', 'speedY: -1.2; speedX: 0.3');
            marker.appendChild(ring2);

            // Upper ring
            const ring3 = document.createElement('a-torus');
            ring3.setAttribute('radius', '0.06');
            ring3.setAttribute('radius-tubular', '0.006');
            ring3.setAttribute('position', '0 0.45 0');
            ring3.setAttribute('rotation', '90 0 0');
            ring3.setAttribute('color', '#7700ff');
            ring3.setAttribute('neon-material', 'color: #7700ff; emissive: #7700ff');
            ring3.setAttribute('ring-spin', 'speedY: 2; speedZ: 0.5');
            marker.appendChild(ring3);

            // Tower apex
            const apex = document.createElement('a-cone');
            apex.setAttribute('radius-bottom', '0.04');
            apex.setAttribute('radius-top', '0.005');
            apex.setAttribute('height', '0.12');
            apex.setAttribute('position', '0 0.63 0');
            apex.setAttribute('color', '#00fff7');
            apex.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7');
            apex.setAttribute('tower-pulse', 'speed: 3; minScale: 0.9; maxScale: 1.1');
            marker.appendChild(apex);

            // Apex energy sphere
            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', '0.025');
            sphere.setAttribute('position', '0 0.7 0');
            sphere.setAttribute('color', '#00fff7');
            sphere.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7');
            sphere.setAttribute('tower-pulse', 'speed: 4');
            marker.appendChild(sphere);

            // Side spires (4x)
            const spirePositions = [
                [0.09, 0.13, 0, 0, 0, -15],
                [-0.09, 0.13, 0, 0, 0, 15],
                [0, 0.13, 0.09, -15, 0, 0],
                [0, 0.13, -0.09, 15, 0, 0]
            ];
            spirePositions.forEach(([x, y, z, rx, ry, rz]) => {
                const spire = document.createElement('a-cone');
                spire.setAttribute('radius-bottom', '0.018');
                spire.setAttribute('radius-top', '0.002');
                spire.setAttribute('height', '0.18');
                spire.setAttribute('position', `${x} ${y} ${z}`);
                spire.setAttribute('rotation', `${rx} ${ry} ${rz}`);
                spire.setAttribute('color', '#ff00aa');
                spire.setAttribute('neon-material', 'color: #ff00aa; emissive: #ff00aa');
                marker.appendChild(spire);
            });

            // Large outer orbit ring
            const outerRing = document.createElement('a-torus');
            outerRing.setAttribute('radius', '0.35');
            outerRing.setAttribute('radius-tubular', '0.006');
            outerRing.setAttribute('position', '0 0.2 0');
            outerRing.setAttribute('rotation', '75 0 0');
            outerRing.setAttribute('color', '#00fff7');
            outerRing.setAttribute('neon-material', 'color: #00fff7; emissive: #00fff7; opacity: 0.5');
            outerRing.setAttribute('ring-spin', 'speedY: 0.6');
            marker.appendChild(outerRing);

            // === DRONES ===
            const droneData = [
                { radius: 0.32, speed: 1.1, yOffset: 0.25, bobAmp: 0.04, bobSpeed: 2.2, color: '#00fff7', label: 'cyan' },
                { radius: 0.28, speed: -0.7, yOffset: 0.35, bobAmp: 0.06, bobSpeed: 1.8, tiltAmp: 15, color: '#ff00aa', label: 'magenta' },
                { radius: 0.38, speed: 0.5, yOffset: 0.15, bobAmp: 0.08, bobSpeed: 3, tiltAmp: 20, color: '#7700ff', label: 'purple' }
            ];
            droneData.forEach(d => {
                const drone = document.createElement('a-entity');
                drone.setAttribute('orbit-drone', `radius: ${d.radius}; speed: ${d.speed}; yOffset: ${d.yOffset}; bobAmp: ${d.bobAmp}; bobSpeed: ${d.bobSpeed}; tiltAmp: ${d.tiltAmp || 12}`);
                
                const box = document.createElement('a-box');
                box.setAttribute('width', '0.04');
                box.setAttribute('height', '0.015');
                box.setAttribute('depth', '0.025');
                box.setAttribute('color', d.color);
                box.setAttribute('neon-material', `color: ${d.color}; emissive: ${d.color}`);
                drone.appendChild(box);

                if (d.label !== 'purple') {
                    for (let side of [-0.025, 0.025]) {
                        const rotor = document.createElement('a-box');
                        rotor.setAttribute('width', '0.025');
                        rotor.setAttribute('height', '0.006');
                        rotor.setAttribute('depth', '0.006');
                        rotor.setAttribute('position', `${side} 0.01 0`);
                        rotor.setAttribute('color', '#ffffff');
                        rotor.setAttribute('neon-material', 'color: #ffffff; emissive: #aaaaaa');
                        drone.appendChild(rotor);
                    }
                }
                marker.appendChild(drone);
            });

            // === FLOATING DATA SHARDS ===
            const shardData = [
                { radius: 0.18, speed: 2.5, yOffset: 0.5, bobAmp: 0.03, bobSpeed: 4, color: '#00fff7' },
                { radius: 0.15, speed: -3, yOffset: 0.6, bobAmp: 0.02, bobSpeed: 5, tiltAmp: 5, color: '#ff00aa' }
            ];
            shardData.forEach(s => {
                const shard = document.createElement('a-entity');
                shard.setAttribute('orbit-drone', `radius: ${s.radius}; speed: ${s.speed}; yOffset: ${s.yOffset}; bobAmp: ${s.bobAmp}; bobSpeed: ${s.bobSpeed}; tiltAmp: ${s.tiltAmp || 12}`);
                const box = document.createElement('a-box');
                box.setAttribute('width', '0.02');
                box.setAttribute('height', '0.04');
                box.setAttribute('depth', '0.02');
                box.setAttribute('rotation', '30 45 0');
                box.setAttribute('color', s.color);
                box.setAttribute('neon-material', `color: ${s.color}; emissive: ${s.color}; wireframe: true`);
                shard.appendChild(box);
                marker.appendChild(shard);
            });

            // Label
            const label = document.createElement('a-text');
            label.setAttribute('value', 'NEXUS TOWER');
            label.setAttribute('position', '0 0.82 0');
            label.setAttribute('align', 'center');
            label.setAttribute('color', '#00fff7');
            label.setAttribute('width', '0.8');
            marker.appendChild(label);

            scene.appendChild(marker);
            container.appendChild(scene);
        }

        // ─── BOTÃO START COM PERMISSÃO DE CÂMARA ───
        document.getElementById('start-btn').addEventListener('click', async () => {
            try {
                // Solicitar permissão da câmara (frontal)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                stream.getTracks().forEach(track => track.stop()); // libertar para o AR.js

                // Iniciar a experiência
                startAR();
            } catch (error) {
                console.error('❌ Erro ao aceder à câmara:', error);
                alert('⚠️ Não foi possível aceder à câmara.\nVerifique as permissões e tente novamente.');
            }
        });
    </script>
</body>
</html>
