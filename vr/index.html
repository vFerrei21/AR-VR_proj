<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS VR — Arquitetura Futurista</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Courier New', monospace; }

    #loading-screen {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .logo {
      font-size: 3rem; font-weight: 900; letter-spacing: 0.3em;
      color: #00fff7;
      text-shadow: 0 0 20px #00fff7, 0 0 60px #00fff7;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 0.8rem; letter-spacing: 0.4em;
      color: #ff00aa; text-shadow: 0 0 10px #ff00aa;
      margin-bottom: 3rem;
    }
    .progress-bar-wrap {
      width: 300px; height: 2px;
      background: rgba(0,255,247,0.2);
      border: 1px solid rgba(0,255,247,0.3);
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: #00fff7;
      box-shadow: 0 0 8px #00fff7;
      transition: width 0.1s linear;
    }
    .loading-text {
      margin-top: 1rem; font-size: 0.65rem;
      letter-spacing: 0.2em; color: rgba(0,255,247,0.5);
    }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem;
      pointer-events: none; z-index: 100;
    }
    .hud-label {
      font-size: 0.6rem; letter-spacing: 0.3em;
      color: rgba(0,255,247,0.6);
      text-shadow: 0 0 6px #00fff7;
    }
    #scene-name {
      font-size: 0.75rem; letter-spacing: 0.4em;
      color: #00fff7; text-shadow: 0 0 10px #00fff7;
    }

    #back-btn {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 200; padding: 0.6rem 2rem;
      background: transparent;
      border: 1px solid rgba(0,255,247,0.4);
      color: rgba(0,255,247,0.7);
      font-family: 'Courier New', monospace;
      font-size: 0.65rem; letter-spacing: 0.3em;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }
    #back-btn:hover {
      border-color: #00fff7;
      color: #00fff7;
      box-shadow: 0 0 20px rgba(0,255,247,0.3);
    }

    .scanline {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,255,247,0.015) 2px, rgba(0,255,247,0.015) 4px
      );
      pointer-events: none; z-index: 50;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">NEXUS</div>
  <div class="tagline">VIRTUAL REALITY — CYBERPUNK ARCHITECTURE</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress"></div></div>
  <div class="loading-text" id="loading-text">INITIALIZING NEURAL INTERFACE...</div>
</div>

<div id="hud">
  <span class="hud-label">NEXUS VR // v2.0.77</span>
  <span id="scene-name">SECTOR 01 — THE CORE</span>
  <span class="hud-label">OLHA PARA OS PORTAIS</span>
</div>

<div class="scanline"></div>

<a href="../index.html" id="back-btn">← VOLTAR AO PORTAL</a>

<a-scene
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: true"
  loading-screen="enabled: false">

  <!-- Assets -->
  <a-assets timeout="10000">
    <!-- Sky colors são geradas proceduralmente via JS -->
  </a-assets>

  <!-- Custom component: environment-switcher -->
  <script>
    AFRAME.registerComponent('environment-switcher', {
      schema: {
        targetEnv: { type: 'string', default: '' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          const scene = document.querySelector('a-scene');
          scene.emit('switch-env', { env: this.data.targetEnv });
        });
      }
    });

    AFRAME.registerComponent('env-manager', {
      init: function () {
        this.currentEnv = 'core';
        this.environments = {
          core: {
            skyColor: '#000814',
            fogColor: '#000814',
            label: 'SECTOR 01 — THE CORE',
            groundColor: '#001233',
            glowColor: '#00fff7'
          },
          megacity: {
            skyColor: '#05000a',
            fogColor: '#0d0018',
            label: 'SECTOR 02 — MEGACITY GRID',
            groundColor: '#0d001a',
            glowColor: '#ff00aa'
          },
          wasteland: {
            skyColor: '#0d0800',
            fogColor: '#1a0a00',
            label: 'SECTOR 03 — NEON WASTELAND',
            groundColor: '#0a0500',
            glowColor: '#ff6600'
          }
        };

        this.el.sceneEl.addEventListener('switch-env', (e) => {
          this.switchTo(e.detail.env);
        });
      },

      switchTo: function (envName) {
        if (!this.environments[envName]) return;
        this.currentEnv = envName;
        const env = this.environments[envName];

        // Update sky
        const sky = document.querySelector('#main-sky');
        sky.setAttribute('color', env.skyColor);

        // Update fog
        const scene = document.querySelector('a-scene');
        scene.setAttribute('fog', `type: linear; color: ${env.fogColor}; near: 5; far: 50`);

        // Update ground
        const ground = document.querySelector('#main-ground');
        ground.setAttribute('color', env.groundColor);

        // Update HUD label
        document.getElementById('scene-name').textContent = env.label;

        // Hide all env groups, show target
        ['core', 'megacity', 'wasteland'].forEach(name => {
          const el = document.querySelector('#env-' + name);
          if (el) {
            if (name === envName) {
              el.setAttribute('visible', 'true');
              el.setAttribute('scale', '1 1 1');
            } else {
              el.setAttribute('visible', 'false');
              el.setAttribute('scale', '0 0 0');
            }
          }
        });

        // Flash effect
        const flash = document.querySelector('#flash');
        if (flash) {
          flash.setAttribute('opacity', '0.6');
          setTimeout(() => flash.setAttribute('opacity', '0'), 300);
        }
      }
    });

    // Hotspot pulse animation component
    AFRAME.registerComponent('hotspot-pulse', {
      init: function () {
        this.t = 0;
        this.base = this.el.getAttribute('scale') || { x: 1, y: 1, z: 1 };
      },
      tick: function (time, delta) {
        this.t += delta * 0.001;
        const s = 1 + 0.12 * Math.sin(this.t * 3);
        this.el.setAttribute('scale', `${s} ${s} ${s}`);
      }
    });

    // Floating animation
    AFRAME.registerComponent('float-anim', {
      schema: { speed: { default: 1 }, amplitude: { default: 0.15 }, offset: { default: 0 } },
      init: function () {
        this.startY = this.el.object3D.position.y;
        this.t = this.data.offset;
      },
      tick: function (time, delta) {
        this.t += delta * 0.001 * this.data.speed;
        this.el.object3D.position.y = this.startY + Math.sin(this.t) * this.data.amplitude;
      }
    });

    // Slow rotation
    AFRAME.registerComponent('slow-rotate', {
      schema: { speed: { default: 0.2 }, axis: { default: 'y' } },
      tick: function (time, delta) {
        const r = this.el.object3D.rotation;
        if (this.data.axis === 'y') r.y += (delta * 0.001) * this.data.speed;
        if (this.data.axis === 'x') r.x += (delta * 0.001) * this.data.speed;
      }
    });
  </script>

  <!-- Scene root with env manager -->
  <a-entity env-manager></a-entity>

  <!-- Sky & Ground -->
  <a-sky id="main-sky" color="#000814"></a-sky>

  <!-- Flash overlay for transitions -->
  <a-plane id="flash" position="0 0 -0.5" width="3" height="2"
    color="#00fff7" opacity="0" material="shader: flat"></a-plane>

  <!-- Ground grid -->
  <a-plane id="main-ground"
    rotation="-90 0 0" position="0 -1.5 0"
    width="200" height="200"
    color="#001233"
    material="wireframe: true; wireframeLinewidth: 1; color: #00fff7; opacity: 0.15">
  </a-plane>

  <!-- ===== ENV CORE (SECTOR 01) ===== -->
  <a-entity id="env-core" visible="true">

    <!-- Giant tower structures -->
    <a-entity position="0 0 -15">
      <a-box width="4" height="40" depth="4" position="-8 18 0"
        color="#001233" material="wireframe: true; color: #00fff7; opacity: 0.4">
      </a-box>
      <a-box width="3" height="30" depth="3" position="8 13 0"
        color="#001233" material="wireframe: true; color: #00fff7; opacity: 0.3">
      </a-box>
      <a-box width="5" height="50" depth="5" position="0 23 -5"
        color="#001233" material="wireframe: true; color: #00fff7; opacity: 0.25">
      </a-box>
      <!-- Neon rings on towers -->
      <a-torus radius="2.2" radius-tubular="0.04" position="-8 5 0" rotation="0 0 90"
        color="#00fff7" material="shader: flat; color: #00fff7" slow-rotate="speed:0.3">
      </a-torus>
      <a-torus radius="1.7" radius-tubular="0.04" position="8 8 0" rotation="0 0 90"
        color="#ff00aa" material="shader: flat; color: #ff00aa" slow-rotate="speed:0.5; axis:x">
      </a-torus>
    </a-entity>

    <!-- Floating data cubes around player -->
    <a-entity float-anim="speed:0.7; amplitude:0.2; offset:0">
      <a-box width="0.4" height="0.4" depth="0.4" position="4 1.5 -5" rotation="30 45 0"
        color="#00fff7" material="wireframe: true; color: #00fff7; opacity: 0.8"
        slow-rotate="speed:1.2">
      </a-box>
    </a-entity>
    <a-entity float-anim="speed:0.9; amplitude:0.3; offset:2">
      <a-box width="0.3" height="0.6" depth="0.3" position="-5 2 -4" rotation="0 30 15"
        color="#ff00aa" material="wireframe: true; color: #ff00aa; opacity: 0.8"
        slow-rotate="speed:0.8">
      </a-box>
    </a-entity>
    <a-entity float-anim="speed:0.6; amplitude:0.25; offset:4">
      <a-box width="0.5" height="0.2" depth="0.5" position="2 3 -6" rotation="45 0 20"
        color="#7700ff" material="wireframe: true; color: #7700ff; opacity: 0.8"
        slow-rotate="speed:1.5">
      </a-box>
    </a-entity>

    <!-- Text labels -->
    <a-text value="SECTOR 01" position="0 3.5 -8" align="center"
      color="#00fff7" width="8" font="kelsonsans"
      material="shader: flat">
    </a-text>
    <a-text value="THE CORE" position="0 2.8 -8" align="center"
      color="rgba(0,255,247,0.5)" width="5">
    </a-text>

    <!-- PORTAL TO MEGACITY -->
    <a-entity position="4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 -30 0"
        color="#ff00aa" material="shader: flat; color: #ff00aa"
        environment-switcher="targetEnv: megacity"
        class="clickable"
        hotspot-pulse
        cursor-listener>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 -30 0"
        color="#ff00aa" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: megacity" class="clickable">
      </a-plane>
      <a-text value="→ MEGACITY" position="0 1.1 0" align="center"
        color="#ff00aa" width="4" rotation="0 -30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(255,0,170,0.5)" width="3.5" rotation="0 -30 0">
      </a-text>
    </a-entity>

    <!-- PORTAL TO WASTELAND -->
    <a-entity position="-4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 30 0"
        color="#ff6600" material="shader: flat; color: #ff6600"
        environment-switcher="targetEnv: wasteland"
        class="clickable"
        hotspot-pulse
        cursor-listener>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 30 0"
        color="#ff6600" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: wasteland" class="clickable">
      </a-plane>
      <a-text value="→ WASTELAND" position="0 1.1 0" align="center"
        color="#ff6600" width="4" rotation="0 30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(255,102,0,0.5)" width="3.5" rotation="0 30 0">
      </a-text>
    </a-entity>

  </a-entity>

  <!-- ===== ENV MEGACITY (SECTOR 02) ===== -->
  <a-entity id="env-megacity" visible="false" scale="0 0 0">

    <!-- Dense grid of buildings -->
    <a-entity position="0 0 -20">
      <a-box width="2" height="20" depth="2" position="-6 8 0"
        color="#0d001a" material="wireframe: true; color: #ff00aa; opacity: 0.5">
      </a-box>
      <a-box width="1.5" height="35" depth="1.5" position="-3 15 0"
        color="#0d001a" material="wireframe: true; color: #ff00aa; opacity: 0.4">
      </a-box>
      <a-box width="3" height="15" depth="3" position="3 5.5 0"
        color="#0d001a" material="wireframe: true; color: #cc00ff; opacity: 0.4">
      </a-box>
      <a-box width="2" height="25" depth="2" position="7 10.5 0"
        color="#0d001a" material="wireframe: true; color: #ff00aa; opacity: 0.35">
      </a-box>
    </a-entity>

    <!-- Side buildings left -->
    <a-entity position="-15 0 -10">
      <a-box width="3" height="18" depth="3" position="0 7 0"
        color="#0d001a" material="wireframe: true; color: #cc00ff; opacity: 0.3">
      </a-box>
      <a-torus radius="1.5" radius-tubular="0.05" position="0 15 0"
        color="#ff00aa" material="shader: flat; color: #ff00aa" slow-rotate="speed:0.4">
      </a-torus>
    </a-entity>

    <!-- Orbiting sphere decoration -->
    <a-entity position="0 2 -6" slow-rotate="speed:0.5">
      <a-sphere radius="0.15" position="2 0 0"
        color="#ff00aa" material="shader: flat; color: #ff00aa; opacity: 0.9">
      </a-sphere>
      <a-sphere radius="0.1" position="-2.5 0.5 0"

    </a-entity>

    <a-text value="SECTOR 02" position="0 3.5 -8" align="center"
      color="#ff00aa" width="8">
    </a-text>
    <a-text value="MEGACITY GRID" position="0 2.8 -8" align="center"
      color="rgba(255,0,170,0.5)" width="6">
    </a-text>

    <!-- PORTAL TO CORE -->
    <a-entity position="4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 -30 0"
        color="#00fff7" material="shader: flat; color: #00fff7"
        environment-switcher="targetEnv: core"
        class="clickable" hotspot-pulse>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 -30 0"
        color="#00fff7" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: core" class="clickable">
      </a-plane>
      <a-text value="→ THE CORE" position="0 1.1 0" align="center"
        color="#00fff7" width="4" rotation="0 -30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(0,255,247,0.5)" width="3.5" rotation="0 -30 0">
      </a-text>
    </a-entity>

    <!-- PORTAL TO WASTELAND -->
    <a-entity position="-4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 30 0"
        color="#ff6600" material="shader: flat; color: #ff6600"
        environment-switcher="targetEnv: wasteland"
        class="clickable" hotspot-pulse>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 30 0"
        color="#ff6600" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: wasteland" class="clickable">
      </a-plane>
      <a-text value="→ WASTELAND" position="0 1.1 0" align="center"
        color="#ff6600" width="4" rotation="0 30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(255,102,0,0.5)" width="3.5" rotation="0 30 0">
      </a-text>
    </a-entity>
  </a-entity>

  <!-- ===== ENV WASTELAND (SECTOR 03) ===== -->
  <a-entity id="env-wasteland" visible="false" scale="0 0 0">

    <!-- Ruined structures -->
    <a-entity position="0 0 -15">
      <!-- Broken tower -->
      <a-box width="5" height="12" depth="5" position="-7 4 0"
        color="#0a0500" material="wireframe: true; color: #ff6600; opacity: 0.5">
      </a-box>
      <a-box width="5" height="5" depth="5" position="-7 12 2" rotation="0 0 15"
        color="#0a0500" material="wireframe: true; color: #ff6600; opacity: 0.3">
      </a-box>
      <!-- Collapsed pillar -->
      <a-cylinder radius="1.2" height="8" position="6 -1 0" rotation="0 0 80"
        color="#0a0500" material="wireframe: true; color: #ff4400; opacity: 0.4">
      </a-cylinder>
      <!-- Debris boxes -->
      <a-box width="1" height="1" depth="1" position="2 -1 3" rotation="20 45 0"
        color="#ff6600" material="wireframe: true; color: #ff6600; opacity: 0.6">
      </a-box>
      <a-box width="0.7" height="1.4" depth="0.7" position="-2 -1 5" rotation="0 30 40"
        color="#ff4400" material="wireframe: true; color: #ff4400; opacity: 0.5">
      </a-box>
    </a-entity>

    <!-- Embers / particles floating -->
    <a-entity float-anim="speed:0.3; amplitude:0.5; offset:0">
      <a-sphere radius="0.06" position="3 2 -5"
        color="#ff6600" material="shader: flat; color: #ff6600">
      </a-sphere>
    </a-entity>
    <a-entity float-anim="speed:0.5; amplitude:0.4; offset:1.5">
      <a-sphere radius="0.04" position="-2 1.5 -4"
        color="#ff4400" material="shader: flat; color: #ff4400">
      </a-sphere>
    </a-entity>
    <a-entity float-anim="speed:0.4; amplitude:0.6; offset:3">
      <a-sphere radius="0.05" position="1 3 -6"
        color="#ffaa00" material="shader: flat; color: #ffaa00">
      </a-sphere>
    </a-entity>

    <a-text value="SECTOR 03" position="0 3.5 -8" align="center"
      color="#ff6600" width="8">
    </a-text>
    <a-text value="NEON WASTELAND" position="0 2.8 -8" align="center"
      color="rgba(255,102,0,0.5)" width="6">
    </a-text>
    <a-text value="CIVILIZAÇÃO EXTINTA" position="0 2.2 -8" align="center"
      color="rgba(255,68,0,0.35)" width="4">
    </a-text>

    <!-- PORTAL TO CORE -->
    <a-entity position="4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 -30 0"
        color="#00fff7" material="shader: flat; color: #00fff7"
        environment-switcher="targetEnv: core"
        class="clickable" hotspot-pulse>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 -30 0"
        color="#00fff7" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: core" class="clickable">
      </a-plane>
      <a-text value="→ THE CORE" position="0 1.1 0" align="center"
        color="#00fff7" width="4" rotation="0 -30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(0,255,247,0.5)" width="3.5" rotation="0 -30 0">
      </a-text>
    </a-entity>

    <!-- PORTAL TO MEGACITY -->
    <a-entity position="-4 0.5 -7">
      <a-torus radius="0.7" radius-tubular="0.06" rotation="0 30 0"
        color="#ff00aa" material="shader: flat; color: #ff00aa"
        environment-switcher="targetEnv: megacity"
        class="clickable" hotspot-pulse>
      </a-torus>
      <a-plane width="1.2" height="1.2" position="0 0 0" rotation="0 30 0"
        color="#ff00aa" opacity="0.08" material="shader: flat"
        environment-switcher="targetEnv: megacity" class="clickable">
      </a-plane>
      <a-text value="→ MEGACITY" position="0 1.1 0" align="center"
        color="#ff00aa" width="4" rotation="0 30 0">
      </a-text>
      <a-text value="[OLHA PARA ENTRAR]" position="0 -1 0" align="center"
        color="rgba(255,0,170,0.5)" width="3.5" rotation="0 30 0">
      </a-text>
    </a-entity>
  </a-entity>

  <!-- ===== CAMERA RIG ===== -->
  <a-entity id="rig" position="0 0 0">
    <a-camera id="camera" look-controls wasd-controls>
      <a-cursor
        fuse="true"
        fuse-timeout="1500"
        raycaster="objects: .clickable"
        geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: #00fff7; shader: flat; opacity: 0.8"
        animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
        animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
        animation__fusing2="property: material.color; startEvents: fusing; from: #00fff7; to: #ff00aa; dur: 1500"
        animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 150">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- Ambient light -->
  <a-light type="ambient" color="#112244" intensity="0.8"></a-light>
  <a-light type="directional" color="#00fff7" intensity="0.3" position="1 1 0"></a-light>

</a-scene>

<script>
  // Loading sequence
  const texts = [
    'INITIALIZING NEURAL INTERFACE...',
    'LOADING SECTOR DATA...',
    'CALIBRATING SPATIAL ENGINE...',
    'SYNCING ENVIRONMENT MATRIX...',
    'NEXUS ONLINE'
  ];
  let progress = 0;
  const bar = document.getElementById('progress');
  const loadText = document.getElementById('loading-text');
  const screen = document.getElementById('loading-screen');

  const interval = setInterval(() => {
    progress += 20;
    bar.style.width = progress + '%';
    loadText.textContent = texts[Math.floor(progress / 20) - 1] || texts[texts.length - 1];
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 800);
      }, 600);
    }
  }, 400);

  // Initialise fog
  document.querySelector('a-scene').setAttribute('fog', 'type: linear; color: #000814; near: 5; far: 50');
</script>
</body>
</html>
